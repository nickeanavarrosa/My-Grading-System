<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <script src="app.js" defer></script>

    <style>
      body {
        background: linear-gradient (135 deg, #6d5ad4, #cdcdf1, #6d5ad4);
      }
    </style>
</head>
<body class="bg-light vh-100 d-flex flex-column justify-content-center align-items-center" >

    <div class="card p-4 shadow-sm" style="width: 450 px;">
      <h3 class="card-title text-center mb-4">Grading Computation Engine</h3>

      <div class="mb-3">
        <label for="score-input" class="form-label">Enter Midterm Grade (0-100):</label>
        <input type="text" id="midterm-grade" class="form-control" placeholder="e.g., 80">
      </div>

      <div class="mb-3">
        <label for="score-input" class="form-label">Enter Finals Grade (0-100):</label>
        <input type="text" id="finals-grade" class="form-control" placeholder="e.g., 80">
      </div>

      <button id="compute-btn" class="btn btn-success w-100 mb-4">Compute Grade</button>

      <div class="p-3 bg-white border rounded text-center" id="output-matrix">
        <p class="text-muted m-0">Awating system input computation...</p>
      </div>

    </div>
    
</body>
</html>
